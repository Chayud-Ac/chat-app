# .github/workflows/ci-backend.yml — Go (apps/backend)
# monorepo: paths filter ยิงเฉพาะตอน apps/backend หรือ contract เปลี่ยน
name: CI backend

on:
  push:
    paths: ['apps/backend/**', 'packages/contracts/**']
  pull_request:
    paths: ['apps/backend/**', 'packages/contracts/**']

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - run: go vet ./...
      - run: go test ./... -race -cover
      # install golangci-lint with the runner's Go (1.25) so it isn't built with
      # an older Go than go.mod targets — golangci-lint-action@v6 ships a 1.24 binary
      - run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.1.0
      - run: golangci-lint run
