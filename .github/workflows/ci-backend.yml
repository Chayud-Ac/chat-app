# .github/workflows/ci-backend.yml — Go (apps/backend)
# monorepo: paths filter ยิงเฉพาะตอน apps/backend หรือ contract เปลี่ยน
name: CI backend

on:
  push:
    paths: ['apps/backend/**', 'packages/contracts/**']
  pull_request:
    paths: ['apps/backend/**', 'packages/contracts/**']

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - run: go vet ./...
      - run: go test ./... -race -cover
      - uses: golangci/golangci-lint-action@v6
        with:
          working-directory: apps/backend
