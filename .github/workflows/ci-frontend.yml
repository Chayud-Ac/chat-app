# .github/workflows/ci-frontend.yml — Node/Next.js (apps/frontend)
name: CI frontend

on:
  push:
    paths: ['apps/frontend/**', 'packages/contracts/**']
  pull_request:
    paths: ['apps/frontend/**', 'packages/contracts/**']

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/frontend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
          cache-dependency-path: apps/frontend/pnpm-lock.yaml
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm test
      - run: pnpm build
