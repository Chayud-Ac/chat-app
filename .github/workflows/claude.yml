# .github/workflows/claude.yml
# monorepo: 1 ไฟล์เดียวสำหรับทั้ง repo (ต่างจาก polyrepo ที่ต้องวางต่อ repo)
# Setup: ใน Claude Code รัน `/install-github-app` มันจะตั้ง GitHub App + secret ANTHROPIC_API_KEY ให้อัตโนมัติ
# ใช้เวอร์ชัน Claude Code >= 2.1.128 (patch prompt-injection ที่ leak API key)

name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [assigned]

jobs:
  claude:
    if: contains(github.event.comment.body, '@claude') || github.event.action == 'assigned'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write   # claude-code-action ใช้ OIDC ตอน setup — ขาดอันนี้ run จะ fail
    steps:
      - uses: actions/checkout@v4
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
