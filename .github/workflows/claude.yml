# .github/workflows/claude.yml
# monorepo: 1 ไฟล์เดียวสำหรับทั้ง repo (ต่างจาก polyrepo ที่ต้องวางต่อ repo)
# Setup: ใน Claude Code รัน `/install-github-app` มันจะตั้ง GitHub App + secret ANTHROPIC_API_KEY ให้อัตโนมัติ
# ใช้เวอร์ชัน Claude Code >= 2.1.128 (patch prompt-injection ที่ leak API key)

name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [assigned]

jobs:
  claude:
    if: contains(github.event.comment.body, '@claude') || github.event.action == 'assigned'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      id-token: write   # claude-code-action ใช้ OIDC ตอน setup — ขาดอันนี้ run จะ fail
    steps:
      - uses: actions/checkout@v4
      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          # issue_comment ไม่ auto-push/PR ให้ — ต้อง allow git + gh เอง ไม่งั้น Claude
          # แก้ไฟล์ใน runner แล้ว workspace ถูกทิ้ง ไม่มี branch/PR ออกมา
          claude_args: |
            --allowedTools "Bash(git:*),Bash(gh pr create:*),Bash(gh pr view:*)"
          # บังคับให้ทุก run จบด้วยการเปิด PR เอง (ไม่ใช่แค่ push branch)
          prompt: |
            Implement the request from the triggering issue or comment, following the
            repo's CLAUDE.md and nested apps/<service>/CLAUDE.md conventions.
            When done, create a new branch (e.g. claude/issue-<n>), commit your changes,
            push the branch, and OPEN A PULL REQUEST targeting main with `gh pr create`,
            with a body that references the issue (e.g. "Closes #<n>").
