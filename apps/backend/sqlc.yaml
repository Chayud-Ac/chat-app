version: "2"
sql:
  - engine: "postgresql"
    queries: "./internal/adapters/postgresql/queries"
    schema: "./migrations"
    gen:
      go:
        package: "repo"
        out: "./internal/adapters/postgresql/sqlc"
        sql_package: "pgx/v5"
        emit_interface: true
        emit_empty_slices: true
        emit_pointers_for_null_types: true
        emit_json_tags: false
